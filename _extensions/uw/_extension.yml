title: uw
author: Zhigang Zhang
version: 1.4.1
quarto-required: ">=1.3.0"
contributes:
  formats:
    revealjs:
      theme: [default, uw.scss]
      width: 1150
      slide-level: 4
      logo: "uw-dept-logo-measurement-statistics-vertical.svg"
      menu:
        side: left
      slide-number: true
      footer: ""
      transition: convex
      transition-speed: fast
      date-format: long
      html-math-method:
        method: mathjax
        url: "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
      include-before-body:
        - text: |
            <script src="mathjax-config.js"></script>
            <script src="deck-defaults.js"></script>
      format-resources:
        - deck-defaults.js
        - mathjax-config.js
        - uw-dept-logo-measurement-statistics-vertical.svg
